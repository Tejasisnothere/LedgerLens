<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Upload CSV with Parameters</title>
</head>
<body>
    <h2>Upload CSV File with Parameters</h2>
    <form action="{{ url_for('upload_csv') }}" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".csv" required /><br><br>

        <label>Input Column Name:</label>
        <input type="text" name="inputColName" required /><br><br>

        <label>Output Column Name:</label>
        <input type="text" name="outputColName" required /><br><br>

        <label>Start Date:</label>
        <input type="date" name="start_date" required /><br><br>

        <label>End Date:</label>
        <input type="date" name="end_date" required /><br><br>

        <button type="submit">Upload</button>
    </form>

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}
</body>
</html>
