<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelf Analyzer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: #2c3e50; text-align: center; }
        form { display: flex; flex-direction: column; gap: 1.5rem; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 0.5rem; }
        input[type="file"], input[type="number"] { padding: 0.75rem; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        button { background-color: #3498db; color: white; border: none; padding: 1rem; font-size: 1rem; border-radius: 8px; cursor: pointer; transition: background-color 0.3s; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        #results { margin-top: 2rem; background: #ecf0f1; padding: 1.5rem; border-radius: 8px; display: none; }
        pre { background: #2c3e50; color: #fff; padding: 1rem; border-radius: 8px; white-space: pre-wrap; word-wrap: break-word; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #3498db; animation: spin 1s ease infinite; margin: 1rem auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Shelf Image Analyzer</h1>
        <form id="upload-form">
            <div class="form-group">
                <label for="image">Upload Shelf Image:</label>
                <input type="file" id="image" name="image" accept="image/*" required>
            </div>
            <div class="form-group">
                <label for="confidence">Confidence Threshold (0.0 to 1.0):</label>
                <input type="number" id="confidence" name="confidence_threshold" min="0" max="1" step="0.1" value="0.8" required>
            </div>
            <button type="submit">Analyze Image</button>
        </form>
        <div class="spinner" id="spinner"></div>
        <div id="results">
            <h2>Analysis Results</h2>
            <pre id="json-result"></pre>
        </div>
    </div>

    <script>
        const form = document.getElementById('upload-form');
        const resultsDiv = document.getElementById('results');
        const jsonResult = document.getElementById('json-result');
        const spinner = document.getElementById('spinner');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            
            const formData = new FormData(form);
            
            resultsDiv.style.display = 'none';
            spinner.style.display = 'block';
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData,
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    jsonResult.textContent = JSON.stringify(data, null, 2);
                    resultsDiv.style.display = 'block';
                } else {
                    jsonResult.textContent = JSON.stringify(data, null, 2);
                    resultsDiv.style.display = 'block';
                }

            } catch (error) {
                jsonResult.textContent = `An error occurred: ${error.message}`;
                resultsDiv.style.display = 'block';
            } finally {
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
